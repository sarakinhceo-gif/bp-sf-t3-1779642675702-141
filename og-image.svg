<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="485" cy="464" r="41" fill="#6d28d9" opacity="0.07"/>
    <circle cx="331" cy="218" r="82" fill="#6d28d9" opacity="0.14"/>
    <circle cx="149" cy="468" r="60" fill="#6d28d9" opacity="0.06"/>
    <circle cx="734" cy="-87" r="43" fill="#6d28d9" opacity="0.11"/>
    <circle cx="-44" cy="320" r="51" fill="#6d28d9" opacity="0.10"/>
    <circle cx="166" cy="109" r="72" fill="#6d28d9" opacity="0.12"/>
    <rect x="747" y="675" width="92" height="34" rx="8" fill="#7c3aed" opacity="0.06" transform="rotate(27, 482, 656)"/>
    <rect x="952" y="140" width="23" height="80" rx="8" fill="#7c3aed" opacity="0.09" transform="rotate(17, 125, 94)"/>
    <rect x="908" y="366" width="80" height="45" rx="8" fill="#7c3aed" opacity="0.14" transform="rotate(28, 483, 420)"/>
    <rect x="402" y="33" width="59" height="36" rx="8" fill="#7c3aed" opacity="0.14" transform="rotate(20, 530, 719)"/>
    <rect x="917" y="353" width="78" height="51" rx="8" fill="#7c3aed" opacity="0.14" transform="rotate(22, 1165, 322)"/>
    <rect x="242" y="637" width="42" height="85" rx="8" fill="#7c3aed" opacity="0.04" transform="rotate(22, 33, 254)"/>
    <rect x="871" y="553" width="51" height="57" rx="8" fill="#7c3aed" opacity="0.11" transform="rotate(34, 1276, 428)"/>
    <rect x="235" y="670" width="46" height="58" rx="8" fill="#7c3aed" opacity="0.12" transform="rotate(33, 309, 298)"/>
    <polygon points="475,210 552,364 398,364" fill="#6d28d9" opacity="0.08"/>
    <polygon points="75,94 109,162 41,162" fill="#6d28d9" opacity="0.06"/>
    <polygon points="1139,372 1233,560 1045,560" fill="#6d28d9" opacity="0.05"/>
    <polygon points="1170,70 1259,248 1081,248" fill="#6d28d9" opacity="0.08"/>

  <!-- Wave at bottom -->
  <path d="M0,582 C360,606 840,558 1200,582 L1200,630 L0,630Z" fill="#6d28d9" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    PBN 빌더
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 스트릿패션
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#f472b6" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#f472b6" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 PBN 빌더 — 스트릿패션
  </text>
</svg>